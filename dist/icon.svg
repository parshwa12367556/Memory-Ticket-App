<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a4fff"/>
      <stop offset="100%" stop-color="#5ea3ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ticket shape -->
  <g transform="translate(256,256)">
    <!-- Ticket body -->
    <rect x="-140" y="-100" width="280" height="200" rx="16" fill="#09090f" opacity="0.9"/>
    <!-- Perforation dots -->
    <circle cx="-140" cy="0" r="10" fill="url(#bg)"/>
    <circle cx="140" cy="0" r="10" fill="url(#bg)"/>
    <!-- Perf line -->
    <line x1="-120" y1="40" x2="120" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,6"/>
    <!-- Barcode lines -->
    <g transform="translate(70, -70)">
      <rect x="0" y="0" width="4" height="30" fill="rgba(255,255,255,0.6)" rx="1"/>
      <rect x="8" y="0" width="3" height="22" fill="rgba(255,255,255,0.4)" rx="1"/>
      <rect x="14" y="0" width="5" height="35" fill="rgba(255,255,255,0.7)" rx="1"/>
      <rect x="22" y="0" width="3" height="18" fill="rgba(255,255,255,0.4)" rx="1"/>
      <rect x="28" y="0" width="4" height="28" fill="rgba(255,255,255,0.5)" rx="1"/>
      <rect x="35" y="0" width="3" height="25" fill="rgba(255,255,255,0.6)" rx="1"/>
    </g>
    <!-- Star emoji -->
    <text x="-45" y="-30" font-size="36" fill="rgba(255,255,255,0.9)">🎟️</text>
    <!-- Text -->
    <text x="-45" y="15" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.85)">MEMORY</text>
    <text x="-45" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.85)">TICKET</text>
  </g>
</svg>
